=<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro - No Loading</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // உங்களின் Firebase Config விவரங்களை இங்கே இடவும்
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbRefs = { ref, set, onValue };
    </script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // முதலில் LocalStorage-லிருந்து தகவலை எடுத்து உடனே காட்டுகிறது
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('cached_students');
                return saved ? JSON.parse(saved) : [];
            });
            const [attendance, setAttendance] = useState({});
            const currentDate = new Date().toISOString().split('T')[0];

            useEffect(() => {
                if (!window.db) return;
                
                // பின்னணியில் தரவுகளைப் பெறுதல் (Silent Update)
                const studentRef = window.dbRefs.ref(window.db, 'students');
                window.dbRefs.onValue(studentRef, (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.values(data) : [];
                    setStudents(list);
                    // போனில் சேமித்து வைக்கிறது (அடுத்த முறை வேகமாகத் திறக்க)
                    localStorage.setItem('cached_students', JSON.stringify(list));
                });

                const attRef = window.dbRefs.ref(window.db, 'records/' + currentDate);
                window.dbRefs.onValue(attRef, (snapshot) => {
                    setAttendance(snapshot.val() || {});
                });
            }, []);

            const handleMark = (id, status) => {
                const statusRef = window.dbRefs.ref(window.db, `records/${currentDate}/${id}`);
                window.dbRefs.set(statusRef, status);
            };

            const downloadCSV = () => {
                let csv = '\uFEFFRoll No,Name,Status,Date\n';
                students.forEach(s => {
                    const status = attendance[s.id] === 'P' ? 'Present' : attendance[s.id] === 'A' ? 'Absent' : '-';
                    csv += `${s.roll},${s.name},${status},${currentDate}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Attendance_${currentDate}.csv`;
                a.click();
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white">
                    <header className="bg-indigo-700 p-6 text-white text-center sticky top-0 z-20">
                        <h1 className="text-2xl font-bold tracking-tight">வருகைப் பதிவேடு</h1>
                        <p className="text-xs opacity-75 font-mono">{currentDate}</p>
                    </header>

                    <main className="p-4">
                        <button 
                            onClick={downloadCSV}
                            className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold mb-6 shadow-lg hover:bg-emerald-700 active:scale-95 transition-all"
                        >
                            SAVE REPORT (CSV)
                        </button>

                        <div className="space-y-4">
                            {students.length === 0 && (
                                <div className="text-center py-10">
                                    <p className="text-gray-400">மாணவர்கள் பட்டியல் காலியாக உள்ளது...</p>
                                </div>
                            )}
                            
                            {students.map(s => (
                                <div key={s.id} className="border border-slate-100 p-4 rounded-2xl bg-white shadow-sm">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="font-bold text-slate-800 text-lg">{s.name}</h3>
                                        <span className="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-500 font-bold uppercase">ID: {s.roll}</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => handleMark(s.id, 'P')}
                                            className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${attendance[s.id] === 'P' ? 'bg-green-500 border-green-600 text-white shadow-md scale-[1.02]' : 'bg-white border-slate-50 text-slate-300'}`}
                                        >
                                            PRESENT
                                        </button>
                                        <button 
                                            onClick={() => handleMark(s.id, 'A')}
                                            className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${attendance[s.id] === 'A' ? 'bg-red-500 border-red-600 text-white shadow-md scale-[1.02]' : 'bg-white border-slate-50 text-slate-300'}`}
                                        >
                                            ABSENT
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
