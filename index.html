<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Attendance Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // LocalStorage-லிருந்து தகவல்களைப் பெறுதல் (Offline Storage)
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('offline_students');
                return saved ? JSON.parse(saved) : [
                    { id: '1', name: 'மாணவர் 1', roll: '101' },
                    { id: '2', name: 'மாணவர் 2', roll: '102' }
                ];
            });

            const [attendance, setAttendance] = useState(() => {
                const saved = localStorage.getItem('offline_records');
                return saved ? JSON.parse(saved) : {};
            });

            const currentDate = new Date().toISOString().split('T')[0];

            // தகவல்கள் மாறும்போது சேமித்தல்
            useEffect(() => {
                localStorage.setItem('offline_students', JSON.stringify(students));
                localStorage.setItem('offline_records', JSON.stringify(attendance));
            }, [students, attendance]);

            // வருகை பதிவு செய்தல்
            const markAttendance = (id, status) => {
                setAttendance(prev => ({
                    ...prev,
                    [currentDate]: { ...prev[currentDate], [id]: status }
                }));
            };

            // CSV கோப்பாகப் பதிவிறக்கம் செய்தல் (Offline Download)
            const downloadCSV = () => {
                const daily = attendance[currentDate] || {};
                let csv = '\uFEFFRoll No,Name,Status,Date\n';
                
                students.forEach(s => {
                    const status = daily[s.id] === 'P' ? 'Present' : daily[s.id] === 'A' ? 'Absent' : '-';
                    csv += `${s.roll},${s.name},${status},${currentDate}\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Attendance_${currentDate}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-lg">
                    <div className="bg-blue-600 p-6 text-white text-center">
                        <h1 className="text-xl font-bold italic">OFFLINE ATTENDANCE</h1>
                        <p className="text-xs mt-1">இன்டர்நெட் தேவையில்லை</p>
                    </div>

                    <div className="p-4">
                        <div className="flex justify-between items-center mb-6 bg-gray-50 p-3 rounded-lg border">
                            <span className="font-bold text-gray-700">{currentDate}</span>
                            <button 
                                onClick={downloadCSV}
                                className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md active:scale-95"
                            >
                                SAVE CSV
                            </button>
                        </div>

                        <div className="space-y-4">
                            {students.map(s => (
                                <div key={s.id} className="p-4 border-2 rounded-xl">
                                    <p className="font-bold text-gray-800 mb-2">{s.name} ({s.roll})</p>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => markAttendance(s.id, 'P')}
                                            className={`flex-1 py-2 rounded-lg font-bold border ${attendance[currentDate]?.[s.id] === 'P' ? 'bg-green-500 text-white' : 'text-gray-400'}`}
                                        >
                                            PRESENT
                                        </button>
                                        <button 
                                            onClick={() => markAttendance(s.id, 'A')}
                                            className={`flex-1 py-2 rounded-lg font-bold border ${attendance[currentDate]?.[s.id] === 'A' ? 'bg-red-500 text-white' : 'text-gray-400'}`}
                                        >
                                            ABSENT
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
